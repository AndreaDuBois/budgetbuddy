{% extends "base_app.html" %}
{% block title %}Type It In — BudgetBuddy{% endblock %}

{% block content %}
<div class="page-header">
  <h5>Type It In</h5>
  <a href="/kid/upload{% if event %}?event_id={{ event.id }}{% endif %}" class="btn-flat waves-effect indigo-text">
    <i class="material-icons left">arrow_back</i>Back
  </a>
</div>

<div class="card">
  <div class="card-content">
    <form method="post" action="/receipts/upload/manual">

      <div class="input-field">
        <select id="event_id" name="event_id" required>
          {% for ev in all_events %}
          <option value="{{ ev.id }}" {% if event and ev.id == event.id %}selected{% endif %}>{{ ev.name }}</option>
          {% endfor %}
        </select>
        <label>Shopping Event</label>
      </div>

      {% if role == 'parent' and kids %}
      <div class="input-field">
        <select id="kid_id" name="kid_id" required>
          <option value="" disabled selected>— Select a member —</option>
          {% for kid in kids %}
          <option value="{{ kid.id }}" {% if selected_kid and selected_kid.id == kid.id %}selected{% endif %}>{{ kid.name }}</option>
          {% endfor %}
        </select>
        <label>For which member?</label>
      </div>
      {% endif %}

      <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
        <div class="input-field" style="flex:1;min-width:160px">
          <input type="text" id="store_name" name="store_name" />
          <label for="store_name">Store Name <span class="grey-text">(optional)</span></label>
        </div>
        <div class="input-field" style="width:150px">
          <input type="date" id="receipt_date" name="receipt_date" />
          <label for="receipt_date" class="active">Date <span class="grey-text">(optional)</span></label>
        </div>
      </div>

      <div class="divider" style="margin:0.5rem 0 1rem"></div>
      <div class="section-heading">Items</div>

      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;min-width:320px" id="items-table">
          <thead>
            <tr>
              <th class="review-section-label" style="text-align:left;padding:0 0 0.4rem;border:none">Description</th>
              <th class="review-section-label" style="text-align:center;padding:0 0 0.4rem;width:60px;border:none">Qty</th>
              <th class="review-section-label" style="text-align:right;padding:0 0.5rem 0.4rem 0;width:110px;border:none">Price</th>
              <th style="width:36px;border:none"></th>
            </tr>
          </thead>
          <tbody id="items-body">
            <tr>
              <td style="padding:0.3rem 0.5rem 0.3rem 0">
                <input type="text" name="desc_1" required placeholder="e.g. 3-Pack T-Shirts"
                       style="width:100%;padding:0.45rem 0.65rem;border:1px solid #e0e0e0;border-radius:4px;font-size:0.9rem" />
              </td>
              <td style="padding:0.3rem 0.25rem;text-align:center">
                <input type="number" name="qty_1" min="1" value="1"
                       style="width:52px;padding:0.45rem 0.35rem;border:1px solid #e0e0e0;border-radius:4px;font-size:0.9rem;text-align:center" />
              </td>
              <td style="padding:0.3rem 0 0.3rem 0.25rem">
                <div style="position:relative;display:flex;align-items:center">
                  <span style="position:absolute;left:8px;color:#9e9e9e;font-size:0.9rem;pointer-events:none">$</span>
                  <input type="number" name="price_1" min="0" step="0.01" required placeholder="0.00"
                         style="width:100px;padding:0.45rem 0.35rem 0.45rem 1.5rem;border:1px solid #e0e0e0;border-radius:4px;font-size:0.9rem;text-align:right" />
                </div>
              </td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>

      <input type="hidden" name="row_count" id="row_count" value="1" />

      <a class="btn-flat waves-effect indigo-text" onclick="addRow()"
         style="margin-top:0.75rem;margin-bottom:1.25rem;cursor:pointer">
        <i class="material-icons left">add</i>Add Item
      </a>

      <div class="divider" style="margin-bottom:1rem"></div>

      <div style="display:flex;gap:0.75rem">
        <button type="submit" class="btn waves-effect waves-light indigo darken-1">
          <i class="material-icons left">arrow_forward</i>Next: Review Items
        </button>
        <a href="/kid/upload" class="btn-flat waves-effect grey-text text-darken-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let rowCount = 1;

function addRow() {
  rowCount++;
  document.getElementById('row_count').value = rowCount;
  const tbody = document.getElementById('items-body');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="padding:0.3rem 0.5rem 0.3rem 0">
      <input type="text" name="desc_${rowCount}" required placeholder="Item description"
             style="width:100%;padding:0.45rem 0.65rem;border:1px solid #e0e0e0;border-radius:4px;font-size:0.9rem" />
    </td>
    <td style="padding:0.3rem 0.25rem;text-align:center">
      <input type="number" name="qty_${rowCount}" min="1" value="1"
             style="width:52px;padding:0.45rem 0.35rem;border:1px solid #e0e0e0;border-radius:4px;font-size:0.9rem;text-align:center" />
    </td>
    <td style="padding:0.3rem 0 0.3rem 0.25rem">
      <div style="position:relative;display:flex;align-items:center">
        <span style="position:absolute;left:8px;color:#9e9e9e;font-size:0.9rem;pointer-events:none">$</span>
        <input type="number" name="price_${rowCount}" min="0" step="0.01" required placeholder="0.00"
               style="width:100px;padding:0.45rem 0.35rem 0.45rem 1.5rem;border:1px solid #e0e0e0;border-radius:4px;font-size:0.9rem;text-align:right" />
      </div>
    </td>
    <td style="padding:0.3rem 0 0.3rem 0.25rem">
      <a class="btn-flat waves-effect red-text" onclick="this.closest('tr').remove()" style="padding:0 0.5rem;cursor:pointer">
        <i class="material-icons" style="font-size:1.1rem">close</i>
      </a>
    </td>
  `;
  tbody.appendChild(tr);
}
</script>
{% endblock %}
