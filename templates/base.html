<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Pocket Money{% endblock %}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#3949ab" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pocket Money" />
  <link rel="apple-touch-icon" href="/static/images/icons/icon-192.png" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card z-depth-3">
      <div class="auth-logo">
        <h1><i class="material-icons" style="font-size:1.6rem;vertical-align:middle;margin-right:4px">account_balance_wallet</i>Pocket Money</h1>
        <p>{% block subtitle %}Track your shopping budget{% endblock %}</p>
      </div>
      <div class="card-content">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/js/sw.js');
    }
  </script>
</body>
</html>
